<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ramadan Daily - Bangladesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', 'Hind Siliguri', sans-serif; 
            background-color: #0b101b; 
            color: #f8fafc; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .art-border {
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(16, 185, 129, 0.05);
        }
        .hero { 
            background: linear-gradient(145deg, #064e3b 0%, #022c22 100%); 
            border-radius: 2.5rem; 
            padding: 2rem 1.5rem; 
            text-align: center; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(16px); 
            border-radius: 1.5rem; 
        }

        /* --- REDESIGNED DROPDOWN (BUTTON STYLE) --- */
        .select-trigger {
            width: 100%;
            background: #161e2e;
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* --- MODAL OVERLAY --- */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #selection-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            border-top: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 2rem 2rem 0 0;
            z-index: 60;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-active #modal-overlay { display: block; opacity: 1; }
        .modal-active #selection-sheet { transform: translateY(0); }

        .sheet-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-radius: 50%;
            position: relative;
        }
        .active-item .radio-circle {
            border-color: #10b981;
        }
        .active-item .radio-circle::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* --- TOGGLES --- */
        .toggle-pill {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.5);
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: #94a3b8;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: rgba(16, 185, 129, 0.2); }
        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: #10b981;
        }
    </style>
</head>
<body class="min-h-screen flex justify-center py-8 px-4">

    <div class="w-full max-w-md space-y-6">
        <div class="flex justify-between items-center px-2">
            <h1 class="text-xl font-extrabold text-emerald-400 tracking-tight" id="ui-title">Ramadan Daily</h1>
            
            <div class="flex items-center gap-2 bg-slate-900/50 p-1 px-3 rounded-full border border-white/5">
                <span class="text-[9px] font-bold text-slate-500">EN</span>
                <label class="switch">
                    <input type="checkbox" id="lang-toggle" onchange="saveAndRefresh()">
                    <span class="slider"></span>
                </label>
                <span class="text-[9px] font-bold text-slate-500">বাং</span>
            </div>
        </div>

        <div class="space-y-3 px-2">
            <div class="select-trigger" onclick="toggleModal(true)">
                <span id="selected-division-label">Loading...</span>
                <span class="text-[8px]">▼</span>
            </div>

            <div class="toggle-pill">
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">
                    <span id="ui-method">Method</span>: 
                    <span id="madhab-label" class="text-emerald-400 ml-1">Hanafi</span>
                </span>
                <label class="switch">
                    <input type="checkbox" id="madhab-toggle" onchange="saveAndRefresh()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="hero art-border">
            <p id="next-label" class="text-emerald-300/60 text-[10px] font-bold uppercase tracking-[0.2em]">Next</p>
            <div id="next-time" class="text-6xl font-black my-1 text-white tracking-tighter">--:--</div>
            <div class="flex items-center justify-center gap-2 mt-3">
                <div id="countdown" class="text-xl font-mono font-bold text-emerald-400 tabular-nums">00:00:00</div>
            </div>
            <p id="date-display" class="text-emerald-200/40 text-[10px] mt-4 font-bold uppercase tracking-widest">--</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 text-center">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1" id="ui-sehri-label">Sehri Ends</p>
                <p id="sehri-val" class="text-2xl font-bold text-white tracking-tight">--:--</p>
            </div>
            <div class="glass p-5 text-center">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1" id="ui-iftar-label">Iftar Time</p>
                <p id="iftar-val" class="text-2xl font-bold text-amber-400 tracking-tight">--:--</p>
            </div>
        </div>

        <div class="glass overflow-hidden shadow-2xl">
            <div id="prayer-list" class="divide-y divide-white/5 text-sm"></div>
        </div>

        <p class="text-[9px] text-center text-slate-600 font-bold uppercase tracking-widest" id="ui-footer">Settings Saved Locally</p>
    </div>

    <div id="modal-overlay" onclick="toggleModal(false)"></div>
    <div id="selection-sheet">
        <div class="p-6 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#0f172a] z-10">
            <h3 class="font-bold text-emerald-400" id="modal-header">Select Division</h3>
            <button onclick="toggleModal(false)" class="text-[10px] font-bold uppercase text-slate-500">Close</button>
        </div>
        <div id="division-list"></div>
    </div>

    <script>
        const DIVISIONS = {
            Dhaka: { lat: 23.8103, lng: 90.4125, bn: "ঢাকা" },
            Rajshahi: { lat: 24.3745, lng: 88.6042, bn: "রাজশাহী" },
            Chittagong: { lat: 22.3569, lng: 91.7832, bn: "চট্টগ্রাম" },
            Sylhet: { lat: 24.8949, lng: 91.8687, bn: "সিলেট" },
            Khulna: { lat: 22.8456, lng: 89.5403, bn: "খুলনা" },
            Barisal: { lat: 22.7010, lng: 90.3535, bn: "বরিশাল" },
            Rangpur: { lat: 25.7439, lng: 89.2752, bn: "রংপুর" },
            Mymensingh: { lat: 24.7471, lng: 90.4203, bn: "ময়মনসিংহ" }
        };

        const LANG = {
            en: { title: "Ramadan Daily", method: "Method", hanafi: "Hanafi", salafi: "Salafi", next: "Next", sehri: "Sehri Ends", iftar: "Iftar Time", footer: "Settings Saved to Device", prayers: ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"], tomorrow: "(Tomorrow)", modalHead: "Select Division" },
            bn: { title: "রমজান ডেইল", method: "পদ্ধতি", hanafi: "হানাফী", salafi: "সালাফী", next: "পরবর্তী", sehri: "সেহরি শেষ", iftar: "ইফতারের সময়", footer: "সেটিংস সংরক্ষিত আছে", prayers: ["ফজর", "সূর্যোদয়", "যোহর", "আসর", "মাগরিব", "এশা"], tomorrow: "(আগামীকাল)", modalHead: "বিভাগ নির্বাচন করুন" }
        };

        let currentDivision = localStorage.getItem('ramadan_div') || 'Rajshahi';

        function toggleModal(show) {
            document.body.classList.toggle('modal-active', show);
        }

        function selectDivision(key) {
            currentDivision = key;
            localStorage.setItem('ramadan_div', key);
            toggleModal(false);
            updateUI();
        }

        function loadConfig() {
            const savedSalafi = localStorage.getItem('ramadan_salafi') === 'true';
            const savedLang = localStorage.getItem('ramadan_lang') === 'bn';
            
            document.getElementById('madhab-toggle').checked = savedLang; // Sync toggle
            document.getElementById('lang-toggle').checked = savedLang;
            
            const list = document.getElementById('division-list');
            const header = document.getElementById('modal-header');
            list.innerHTML = '';
            header.textContent = savedLang ? LANG.bn.modalHead : LANG.en.modalHead;

            Object.keys(DIVISIONS).forEach(key => {
                const isActive = key === currentDivision;
                const label = savedLang ? `${DIVISIONS[key].bn} বিভাগ` : `${key} Division`;
                
                const div = document.createElement('div');
                div.className = `sheet-item ${isActive ? 'active-item' : ''}`;
                div.onclick = () => selectDivision(key);
                div.innerHTML = `
                    <span class="font-bold ${isActive ? 'text-emerald-400' : 'text-slate-300'}">${label}</span>
                    <div class="radio-circle"></div>
                `;
                list.appendChild(div);

                if(isActive) {
                    document.getElementById('selected-division-label').textContent = label;
                }
            });
        }

        function saveAndRefresh() {
            localStorage.setItem('ramadan_salafi', document.getElementById('madhab-toggle').checked);
            localStorage.setItem('ramadan_lang', document.getElementById('lang-toggle').checked ? 'bn' : 'en');
            loadConfig();
            updateUI();
        }

        function getTimes(date, loc, isSalafi) {
            const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
            const phi = loc.lat * (Math.PI / 180);
            const declination = 0.409 * Math.sin(2 * Math.PI * (dayOfYear - 81) / 365);
            const getHA = (a) => {
                const alt = a * (Math.PI / 180);
                const v = (Math.sin(alt) - Math.sin(phi) * Math.sin(declination)) / (Math.cos(phi) * Math.cos(declination));
                return Math.acos(Math.max(-1, Math.min(1, v))) * (180 / Math.PI) / 15;
            };
            const eq = 0.165 * Math.sin(4 * Math.PI * (dayOfYear - 81) / 365) - 0.126 * Math.cos(2 * Math.PI * (dayOfYear - 81) / 365) - 0.025 * Math.sin(2 * Math.PI * (dayOfYear - 81) / 365);
            const noon = 12 + 6 - (loc.lng / 15) - eq;
            const asrF = isSalafi ? 1 : 2;
            return {
                Fajr: noon - getHA(-18),
                Sunrise: noon - getHA(-0.833),
                Dhuhr: noon,
                Asr: noon + getHA(Math.atan(1 / (asrF + Math.tan(Math.abs(phi - declination)))) * (180 / Math.PI)),
                Maghrib: noon + getHA(-0.833),
                Isha: noon + getHA(-18)
            };
        }

        function toBnNum(s) {
            const n = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
            return s.replace(/[0-9]/g, w => n[w]);
        }

        function formatD(dec, isBn) {
            let h = Math.floor(dec);
            let m = Math.floor((dec - h) * 60);
            const ap = isBn ? (h >= 12 ? 'পিএম' : 'এএম') : (h >= 12 ? 'PM' : 'AM');
            h = h % 12 || 12;
            let s = `${h}:${m.toString().padStart(2, '0')} ${ap}`;
            return isBn ? toBnNum(s) : s;
        }

        function updateUI() {
            const isBn = document.getElementById('lang-toggle').checked;
            const l = isBn ? LANG.bn : LANG.en;
            const isS = document.getElementById('madhab-toggle').checked;
            const now = new Date();
            const times = getTimes(now, DIVISIONS[currentDivision], isS);

            document.getElementById('ui-title').textContent = l.title;
            document.getElementById('ui-method').textContent = l.method;
            document.getElementById('madhab-label').textContent = isS ? l.salafi : l.hanafi;
            document.getElementById('ui-sehri-label').textContent = l.sehri;
            document.getElementById('ui-iftar-label').textContent = l.iftar;
            document.getElementById('ui-footer').textContent = l.footer;

            document.getElementById('date-display').textContent = now.toLocaleDateString(isBn ? 'bn-BD' : 'en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('sehri-val').textContent = formatD(times.Fajr, isBn);
            document.getElementById('iftar-val').textContent = formatD(times.Maghrib, isBn);

            const list = document.getElementById('prayer-list');
            let html = '';
            let nextN = '', nextT = 0, found = false;
            const cur = now.getHours() + (now.getMinutes() / 60) + (now.getSeconds() / 3600);

            Object.keys(times).forEach((n, i) => {
                const active = !found && times[n] > cur;
                if(active) { found = true; nextN = l.prayers[i]; nextT = times[n]; }
                html += `<div class="flex justify-between px-5 py-4 ${active ? 'bg-emerald-500/10' : ''}">
                    <span class="${active ? 'text-emerald-400 font-bold' : 'text-slate-300'}">${l.prayers[i]}</span>
                    <span class="font-mono ${active ? 'text-emerald-400' : 'text-slate-500'}">${formatD(times[n], isBn)}</span>
                </div>`;
            });
            
            if(!found) { nextN = `${l.prayers[0]} ${l.tomorrow}`; nextT = times.Fajr; }
            list.innerHTML = html;
            document.getElementById('next-label').textContent = `${l.next}: ${nextN}`;
            document.getElementById('next-time').textContent = formatD(nextT, isBn);
            
            let diff = (nextT - cur) * 3600;
            if(diff < 0) diff += 86400;
            const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = Math.floor(diff%60);
            let cStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('countdown').textContent = isBn ? toBnNum(cStr) : cStr;

            const label = isBn ? `${DIVISIONS[currentDivision].bn} বিভাগ` : `${currentDivision} Division`;
            document.getElementById('selected-division-label').textContent = label;
        }

        loadConfig();
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
